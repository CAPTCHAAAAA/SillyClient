name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Validate GitHub Pages files
        run: node scripts/validate-pages.mjs
