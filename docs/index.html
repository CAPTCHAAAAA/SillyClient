<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SillyClient - SillyTavern 跨平台启动器</title>
  <meta name="description" content="SillyTavern 跨平台启动器，内置完整 Node.js 运行时，安装即用，无需 Termux，无需命令行。" />
  <style>
    /*
     * SillyClient Landing
     * 液态玻璃: taste-skill Appendix C 近似
     * 丝绸流光: CSS morphing + blur
     * 品牌: #e8365d #1a1625 #f0ece8
     * 字体: PingFang SC 系统栈
     * AI Tell: 全部规避
     */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1625;
      --fg: #f0ece8;
      --fg-muted: rgba(240, 236, 232, 0.48);
      --fg-dim: rgba(240, 236, 232, 0.24);
      --brand: #e8365d;
      --brand-soft: rgba(232, 54, 93, 0.12);
      --brand-glow: rgba(232, 54, 93, 0.28);
      --wine: #6a112e;
      --wine-mid: #8b1a3a;
      --glass-border: rgba(255, 255, 255, 0.18);
      --glass-border-inner: rgba(255, 255, 255, 0.10);
      --glass-highlight: rgba(255, 255, 255, 0.22);
      --glass-shadow-lo: rgba(255, 255, 255, 0.06);
      --glass-shadow-out: rgba(0, 0, 0, 0.42);
      --border: rgba(240, 236, 232, 0.06);
      --radius: 20px;
      --radius-pill: 999px;
      --font: "PingFang SC", "Helvetica Neue", "Hiragino Sans GB", "Source Han Sans SC", "Noto Sans SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-fast: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    /* ====================== */
    /* 丝绸流光 (Silk Canvas) */
    /* ====================== */
    .silk {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .silk-blob {
      position: absolute;
      will-change: transform;
      filter: blur(90px);
    }

    .silk-blob:nth-child(1) {
      width: 50vmax; height: 50vmax;
      top: -18%; left: -12%;
      background: var(--wine);
      opacity: 0.38;
      border-radius: 42% 58% 53% 47% / 56% 42% 58% 44%;
      animation: silk-1 22s ease-in-out infinite;
    }
    .silk-blob:nth-child(2) {
      width: 38vmax; height: 38vmax;
      top: 15%; right: -10%;
      background: var(--brand);
      opacity: 0.16;
      border-radius: 56% 44% 62% 38% / 48% 56% 44% 52%;
      animation: silk-2 28s ease-in-out infinite;
    }
    .silk-blob:nth-child(3) {
      width: 32vmax; height: 32vmax;
      bottom: -12%; left: 35%;
      background: var(--wine-mid);
      opacity: 0.24;
      border-radius: 48% 52% 46% 54% / 52% 48% 56% 44%;
      animation: silk-3 25s ease-in-out infinite;
    }
    .silk-blob:nth-child(4) {
      width: 20vmax; height: 20vmax;
      top: 50%; left: 55%;
      background: var(--brand);
      opacity: 0.08;
      border-radius: 55% 45% 60% 40% / 45% 55% 45% 55%;
      animation: silk-4 18s ease-in-out infinite;
    }

    /* 有机 border-radius 变形 + 位移 */
    @keyframes silk-1 {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); border-radius: 42% 58% 53% 47% / 56% 42% 58% 44%; }
      33% { transform: translate(7vw, 4vh) rotate(20deg) scale(1.06); border-radius: 55% 45% 60% 40% / 45% 55% 50% 50%; }
      66% { transform: translate(-4vw, -6vh) rotate(-12deg) scale(0.96); border-radius: 48% 52% 42% 58% / 60% 40% 56% 44%; }
    }
    @keyframes silk-2 {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); border-radius: 56% 44% 62% 38% / 48% 56% 44% 52%; }
      40% { transform: translate(-5vw, 6vh) rotate(-18deg) scale(1.04); border-radius: 44% 56% 38% 62% / 52% 48% 58% 42%; }
      70% { transform: translate(3vw, -3vh) rotate(10deg) scale(0.97); border-radius: 60% 40% 55% 45% / 42% 58% 46% 54%; }
    }
    @keyframes silk-3 {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); border-radius: 48% 52% 46% 54% / 52% 48% 56% 44%; }
      35% { transform: translate(6vw, -5vh) rotate(16deg) scale(1.08); border-radius: 54% 46% 58% 42% / 44% 56% 50% 50%; }
      65% { transform: translate(-3vw, 4vh) rotate(-8deg) scale(0.94); border-radius: 46% 54% 40% 60% / 56% 44% 52% 48%; }
    }
    @keyframes silk-4 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-4vw, -6vh) scale(1.12); }
    }

    /* 光泽条纹 (silk 丝线) */
    .silk-thread {
      position: absolute;
      width: 1px;
      height: 120%;
      top: -10%;
      background: linear-gradient(180deg, transparent 0%, rgba(232, 54, 93, 0.04) 30%, rgba(240, 236, 232, 0.03) 50%, rgba(232, 54, 93, 0.04) 70%, transparent 100%);
      opacity: 0;
      animation: thread-shimmer 12s ease-in-out infinite;
    }
    .silk-thread:nth-child(5) { left: 20%; animation-delay: 0s; }
    .silk-thread:nth-child(6) { left: 45%; animation-delay: 4s; }
    .silk-thread:nth-child(7) { left: 72%; animation-delay: 8s; }

    @keyframes thread-shimmer {
      0%, 100% { opacity: 0; transform: translateY(-10%) scaleY(0.8); }
      50% { opacity: 1; transform: translateY(5%) scaleY(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .silk-blob, .silk-thread { animation: none !important; }
    }

    /* ===== */
    /* Page */
    /* ===== */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ======================== */
    /* 液态玻璃导航栏 (Liquid Glass Nav) */
    /* ======================== */
    nav.liquid-glass {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      isolation: isolate;
      border-radius: 0;
      border: 1px solid var(--glass-border);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.04);
      backdrop-filter: blur(24px) saturate(180%) contrast(1.05);
      -webkit-backdrop-filter: blur(24px) saturate(180%) contrast(1.05);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 var(--glass-shadow-lo),
        0 18px 60px -16px var(--glass-shadow-out);
    }
    nav.liquid-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      border-radius: inherit;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,0.12), transparent 40%),
        linear-gradient(90deg, rgba(255,255,255,0.06), transparent 50%);
      pointer-events: none;
    }
    nav.liquid-glass::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      border: 1px solid var(--glass-border-inner);
      pointer-events: none;
    }

    .nav-left, .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .nav-right { gap: 4px; }

    .logo {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
      color: var(--fg);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .logo-brand { color: var(--brand); }

    .logo-mark {
      width: 8px; height: 8px;
      border-radius: 2px;
      background: var(--brand);
      transform: rotate(45deg);
      box-shadow: 0 0 10px var(--brand-glow);
      transition: box-shadow 0.3s var(--ease);
    }
    .logo:hover .logo-mark {
      box-shadow: 0 0 18px var(--brand-glow);
    }

    .lang-toggle {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-dim);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-pill);
      padding: 4px 12px;
      cursor: pointer;
      transition: color 0.2s var(--ease), border-color 0.2s var(--ease);
      letter-spacing: 0.02em;
    }
    .lang-toggle:hover { color: var(--fg); border-color: var(--brand-soft); }

    .nav-link {
      font-size: 13px;
      color: var(--fg-dim);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      transition: color 0.2s var(--ease), background 0.2s var(--ease);
    }
    .nav-link:hover { color: var(--fg); background: var(--brand-soft); }

    /* ===== */
    /* Hero */
    /* ===== */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 72px 24px 40px;
      min-height: 62dvh;
    }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brand);
      padding: 5px 14px;
      border: 1px solid rgba(232, 54, 93, 0.16);
      border-radius: var(--radius-pill);
      background: var(--brand-soft);
      margin-bottom: 22px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .hero-title {
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 600;
      letter-spacing: -0.035em;
      line-height: 1.08;
      color: var(--fg);
      margin-bottom: 14px;
      text-wrap: balance;
    }
    .hero-title .thin {
      font-weight: 300;
      color: var(--fg-muted);
    }

    .hero-sub {
      font-size: clamp(14px, 2vw, 16px);
      font-weight: 400;
      color: var(--fg-muted);
      max-width: 380px;
      margin-bottom: 36px;
      line-height: 1.65;
      text-wrap: pretty;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ======================== */
    /* 液态玻璃按钮 (Liquid Glass Buttons) */
    /* ======================== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius-pill);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.15s var(--ease), box-shadow 0.3s ease;
      cursor: pointer;
      border: none;
      letter-spacing: -0.005em;
      position: relative;
      isolation: isolate;
      overflow: hidden;
    }
    .btn:active { transform: scale(0.97) translateY(1px); }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .btn-primary {
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      background: linear-gradient(135deg, var(--brand), var(--wine-mid));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow:
        0 4px 24px var(--brand-glow),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -1px 0 rgba(0,0,0,0.12);
    }
    .btn-primary::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,0.10);
      pointer-events: none;
    }
    .btn-primary:hover {
      box-shadow: 0 6px 32px var(--brand-glow), inset 0 1px 0 rgba(255,255,255,0.28);
      transform: translateY(-1px);
    }

    .btn-glass {
      color: var(--fg);
      border: 1px solid var(--glass-border);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.06);
      backdrop-filter: blur(24px) saturate(180%) contrast(1.05);
      -webkit-backdrop-filter: blur(24px) saturate(180%) contrast(1.05);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 var(--glass-shadow-lo),
        0 8px 32px -8px var(--glass-shadow-out);
    }
    .btn-glass::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      border: 1px solid var(--glass-border-inner);
      pointer-events: none;
    }
    .btn-glass:hover {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05)),
        rgba(232, 54, 93, 0.08);
      transform: translateY(-1px);
    }

    /* ============================= */
    /* 液态玻璃面板 (Liquid Glass Panel) */
    /* ============================= */
    .features {
      max-width: 580px;
      margin: 0 auto;
      padding: 0 20px 52px;
      width: 100%;
    }

    .glass-panel {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--glass-border);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.04);
      backdrop-filter: blur(24px) saturate(180%) contrast(1.05);
      -webkit-backdrop-filter: blur(24px) saturate(180%) contrast(1.05);
      box-shadow:
        0 20px 60px -12px var(--glass-shadow-out),
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 var(--glass-shadow-lo);
    }
    /* 高光叠层 */
    .glass-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      border-radius: inherit;
      background:
        radial-gradient(ellipse 60% 50% at 25% 0%, rgba(232, 54, 93, 0.07), transparent 55%),
        radial-gradient(circle at 75% 100%, rgba(240, 236, 232, 0.04), transparent 40%),
        linear-gradient(100deg, rgba(255,255,255,0.06), transparent 45%);
      pointer-events: none;
    }
    /* 内边框 */
    .glass-panel::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      border: 1px solid var(--glass-border-inner);
      pointer-events: none;
    }

    .feat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      z-index: 1;
    }

    .feat {
      padding: 22px 20px;
      transition: background 0.3s var(--ease);
    }
    .feat:not(:last-child) { border-bottom: 0.5px solid var(--border); }
    .feat:nth-child(odd):not(:last-child) { border-right: 0.5px solid var(--border); }
    .feat:hover { background: var(--brand-soft); }

    .feat-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      background: var(--brand-soft);
      color: var(--brand);
      transition: background 0.3s var(--ease);
    }
    .feat:hover .feat-icon { background: rgba(232, 54, 93, 0.18); }
    .feat-icon svg { width: 14px; height: 14px; stroke-width: 2; }

    .feat-name {
      font-size: 13.5px;
      font-weight: 500;
      margin-bottom: 3px;
      letter-spacing: -0.01em;
      color: var(--fg);
    }

    .feat-desc {
      font-size: 12px;
      color: var(--fg-dim);
      line-height: 1.55;
    }

    /* ====== */
    /* Footer */
    /* ====== */
    footer {
      padding: 18px 32px;
      border-top: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .foot-text { font-size: 11px; color: var(--fg-dim); }
    .foot-links { display: flex; gap: 16px; }
    .foot-links a {
      font-size: 11px;
      color: var(--fg-dim);
      text-decoration: none;
      transition: color 0.2s var(--ease);
    }
    .foot-links a:hover { color: var(--fg-muted); }

    /* ====== */
    /* 入场  */
    /* ====== */
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-eyebrow  { animation: rise 0.65s var(--ease) 0.1s both; }
    .hero-title    { animation: rise 0.65s var(--ease) 0.2s both; }
    .hero-sub      { animation: rise 0.65s var(--ease) 0.3s both; }
    .hero-actions  { animation: rise 0.65s var(--ease) 0.4s both; }
    .features      { animation: rise 0.65s var(--ease) 0.5s both; }
    footer         { animation: rise 0.65s var(--ease) 0.58s both; }

    /* ======== */
    /* Responsive */
    /* ======== */
    @media (max-width: 640px) {
      nav.liquid-glass { padding: 12px 18px; }
      .hero { padding: 48px 18px 32px; min-height: 55dvh; }
      .hero-actions { flex-direction: column; width: 100%; max-width: 280px; }
      .btn { justify-content: center; width: 100%; }
      .feat-grid { grid-template-columns: 1fr; }
      .feat:nth-child(odd):not(:last-child) { border-right: none; }
      footer { padding: 14px 18px; flex-direction: column; gap: 8px; text-align: center; }
    }

    /* ======== */
    /* A11y     */
    /* ======== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
    @media (prefers-reduced-transparency: reduce) {
      .silk-blob { display: none; }
      .glass-panel, nav.liquid-glass, .btn-glass, .btn-primary {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
      nav.liquid-glass {
        background: rgba(26, 22, 37, 0.95);
      }
      .glass-panel {
        background: rgba(26, 22, 37, 0.92);
      }
    }
  </style>
</head>
<body>
  <!-- 丝绸流光背景 -->
  <div class="silk" aria-hidden="true">
    <div class="silk-blob"></div>
    <div class="silk-blob"></div>
    <div class="silk-blob"></div>
    <div class="silk-blob"></div>
    <div class="silk-thread"></div>
    <div class="silk-thread"></div>
    <div class="silk-thread"></div>
  </div>

  <div class="page">
    <nav class="liquid-glass">
      <div class="nav-left">
        <a href="/" class="logo">
          <span class="logo-mark"></span>
          <span>Silly</span><span class="logo-brand">Client</span>
        </a>
        <button class="lang-toggle" id="langBtn" onclick="toggleLang()">EN</button>
      </div>
      <div class="nav-right">
        <a href="https://github.com/CAPTCHAAAAA/SillyClient" target="_blank" rel="noopener" class="nav-link" data-i18n="nav_src">源码</a>
        <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases" target="_blank" rel="noopener" class="nav-link">Releases</a>
      </div>
    </nav>

    <section class="hero">
      <span class="hero-eyebrow">SillyTavern Launcher</span>
      <h1 class="hero-title">
        <span data-i18n="t1">SillyTavern</span>,
        <span class="thin" data-i18n="t1d">装进口袋</span>
      </h1>
      <p class="hero-sub" data-i18n="sub">内置 Node.js 运行时，安装即用。无需 Termux，无需命令行。</p>
      <div class="hero-actions">
        <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases/latest" target="_blank" rel="noopener" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          Android
        </a>
        <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases/download/v1.4.1/SillyClient-Setup-1.4.1.exe" target="_blank" rel="noopener" class="btn btn-glass">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Windows
        </a>
      </div>
    </section>

    <section class="features">
      <div class="glass-panel">
        <div class="feat-grid">
          <div class="feat">
            <div class="feat-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </div>
            <div class="feat-name" data-i18n="n1">内置运行时</div>
            <div class="feat-desc" data-i18n="d1">Node.js 随应用打包，无依赖。</div>
          </div>
          <div class="feat">
            <div class="feat-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            </div>
            <div class="feat-name" data-i18n="n2">多实例管理</div>
            <div class="feat-desc" data-i18n="d2">独立端口与配置，卡片切换。</div>
          </div>

        if (i18n[l][k]) el.textContent = i18n[l][k];
      });
      document.getElementById('langBtn').textContent = l === 'zh' ? 'EN' : '中文';
      document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    }
    function toggleLang() { setLang(lang === 'zh' ? 'en' : 'zh'); }
