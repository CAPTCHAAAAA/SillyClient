<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SillyClient - SillyTavern 跨平台启动器</title>
  <meta name="description" content="SillyTavern 跨平台启动器，内置完整运行时，安装即用，无需命令行。" />
  <style>
    /* ========================================
       SillyClient Landing Page
       Design System: 源码对齐
       背景: #1a1625 (暗) / #f0ece8 (亮)
       品牌色: #e8365d (品红)
       字体栈: PingFang SC, system-ui, sans-serif
       液态玻璃: backdrop-filter blur + inset shadow
       圆角: 18px (卡片) / 36px (面板)
       缓动: cubic-bezier(0.22, 1, 0.36, 1)
       ======================================== */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 暗色模式（默认） */
      --bg: #1a1625;
      --bg-secondary: rgba(26, 22, 37, 0.7);
      --fg: #f0ece8;
      --fg-muted: rgba(240, 236, 232, 0.45);
      --fg-dim: rgba(240, 236, 232, 0.25);
      --brand: #e8365d;
      --brand-soft: rgba(232, 54, 93, 0.15);
      --brand-glow: rgba(232, 54, 93, 0.3);
      --glass: rgba(26, 22, 37, 0.6);
      --glass-border: rgba(240, 236, 232, 0.08);
      --glass-highlight: rgba(240, 236, 232, 0.1);
      --glass-shadow-inset: rgba(0, 0, 0, 0.15);
      --glass-shadow-outer: rgba(0, 0, 0, 0.3);
      --border: rgba(240, 236, 232, 0.08);
      --radius-card: 18px;
      --radius-panel: 36px;
      --radius-btn: 999px;
      --font: "PingFang SC", "Helvetica Neue", "Hiragino Sans GB", "Source Han Sans SC", "Noto Sans SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    .light {
      --bg: #f0ece8;
      --bg-secondary: rgba(240, 236, 232, 0.8);
      --fg: #1a1625;
      --fg-muted: rgba(26, 22, 37, 0.45);
      --fg-dim: rgba(26, 22, 37, 0.25);
      --brand: #e8365d;
      --brand-soft: rgba(232, 54, 93, 0.1);
      --brand-glow: rgba(232, 54, 93, 0.2);
      --glass: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(0, 0, 0, 0.06);
      --glass-highlight: rgba(255, 255, 255, 0.4);
      --glass-shadow-inset: rgba(0, 0, 0, 0.06);
      --glass-shadow-outer: rgba(0, 0, 0, 0.08);
      --border: rgba(0, 0, 0, 0.06);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      line-height: 1.47;
      letter-spacing: -0.01em;
      font-weight: 400;
    }

    /* === WebGL Canvas === */
    #webgl-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* === 顶部流光渐变 === */
    .ambient-glow {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 50% 30% at 50% 0%, var(--brand-glow) 0%, transparent 100%),
        radial-gradient(ellipse 70% 40% at 50% 100%, var(--bg) 0%, transparent 100%);
      opacity: 0.4;
    }

    /* === Page Layout === */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* === 导航栏（液态玻璃） === */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      backdrop-filter: blur(40px) saturate(1.5);
      -webkit-backdrop-filter: blur(40px) saturate(1.5);
      background: var(--glass);
      border-bottom: 0.5px solid var(--glass-border);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 var(--glass-shadow-inset);
    }

    .nav-left { display: flex; align-items: center; gap: 16px; }

    .logo {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
      color: var(--fg);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-brand { color: var(--brand); }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 10px var(--brand-glow);
    }

    .lang-toggle {
      font-size: 12px;
      font-weight: 500;
      color: var(--fg-muted);
      background: var(--glass);
      border: 0.5px solid var(--glass-border);
      border-radius: var(--radius-btn);
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.25s var(--ease);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 var(--glass-highlight);
      font-family: var(--font);
      letter-spacing: 0.02em;
    }
    .lang-toggle:hover {
      color: var(--fg);
      border-color: var(--brand-soft);
      background: var(--brand-soft);
    }

    .nav-links { display: flex; gap: 4px; align-items: center; }

    .nav-link {
      font-size: 13px;
      font-weight: 400;
      color: var(--fg-dim);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: var(--radius-btn);
      transition: all 0.25s var(--ease);
    }
    .nav-link:hover {
      color: var(--fg);
      background: var(--brand-soft);
    }

    /* === Hero === */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 24px 40px;
      min-height: 65dvh;
    }

    .hero-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 20px;
      padding: 5px 14px;
      border: 0.5px solid rgba(232, 54, 93, 0.2);
      border-radius: var(--radius-btn);
      background: var(--brand-soft);
    }

    .hero-title {
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--fg);
      margin-bottom: 14px;
      text-wrap: balance;
    }

    .hero-title .dim {
      font-weight: 400;
      color: var(--fg-muted);
    }

    .hero-sub {
      font-size: clamp(14px, 2vw, 16px);
      font-weight: 400;
      color: var(--fg-muted);
      max-width: 420px;
      margin-bottom: 36px;
      line-height: 1.6;
      text-wrap: pretty;
    }

    .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    /* === 按钮（iOS 玻璃风格） === */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius-btn);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s var(--ease), box-shadow 0.3s ease, background 0.3s ease;
      cursor: pointer;
      border: none;
      letter-spacing: -0.005em;
    }
    .btn:active { transform: scale(0.97); }
    .btn svg { width: 16px; height: 16px; }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      box-shadow:
        0 4px 16px var(--brand-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 24px var(--brand-glow), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .btn-glass {
      background: var(--glass);
      color: var(--fg);
      border: 0.5px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 var(--glass-shadow-inset),
        0 0.5px 0 var(--glass-highlight);
    }
    .btn-glass:hover {
      background: var(--glass-highlight);
      border-color: rgba(232, 54, 93, 0.15);
    }

    /* === 特性卡片（液态玻璃面板） === */
    .features {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 20px 56px;
      width: 100%;
    }

    .features-card {
      background: var(--glass);
      backdrop-filter: blur(40px) saturate(1.5);
      -webkit-backdrop-filter: blur(40px) saturate(1.5);
      border: 0.5px solid var(--glass-border);
      border-radius: var(--radius-card);
      box-shadow:
        0 8px 32px var(--glass-shadow-outer),
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 var(--glass-shadow-inset);
      overflow: hidden;
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .feature {
      padding: 22px 20px;
      transition: background 0.3s var(--ease);
    }
    .feature:not(:last-child) {
      border-bottom: 0.5px solid var(--border);
    }
    .feature:nth-child(odd):not(:last-child) {
      border-right: 0.5px solid var(--border);
    }
    .feature:nth-child(even):not(:last-child) {
      border-left: 0.5px solid var(--border);
    }
    .feature:hover { background: var(--brand-soft); }

    .feature-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      background: var(--brand-soft);
      color: var(--brand);
    }
    .feature-icon svg { width: 14px; height: 14px; stroke-width: 2; }

    .feature-label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 3px;
      letter-spacing: -0.01em;
      color: var(--fg);
    }

    .feature-text {
      font-size: 12px;
      color: var(--fg-dim);
      line-height: 1.5;
    }

    /* === Footer === */
    footer {
      padding: 20px 32px;
      border-top: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      background: var(--glass);
      box-shadow: inset 0 1px 0 var(--glass-highlight);
    }

    .footer-text {
      font-size: 11px;
      color: var(--fg-dim);
    }

    .footer-links { display: flex; gap: 14px; }
    .footer-links a {
      font-size: 11px;
      color: var(--fg-dim);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .footer-links a:hover { color: var(--fg-muted); }

    /* === 响应式 === */
    @media (max-width: 640px) {
      nav { padding: 14px 20px; }
      .hero { padding: 48px 20px 32px; min-height: 60dvh; }
      .hero-actions { flex-direction: column; width: 100%; max-width: 280px; }
      .btn { justify-content: center; width: 100%; }
      .features-grid { grid-template-columns: 1fr; }
      .feature:nth-child(odd):not(:last-child) { border-right: none; }
      .feature:nth-child(even):not(:last-child) { border-left: none; }
      footer { padding: 16px 20px; flex-direction: column; gap: 10px; text-align: center; }
    }

    /* === 入场动画 === */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-tag { animation: fadeUp 0.7s var(--ease) 0.1s both; }
    .hero-title { animation: fadeUp 0.7s var(--ease) 0.2s both; }
    .hero-sub { animation: fadeUp 0.7s var(--ease) 0.3s both; }
    .hero-actions { animation: fadeUp 0.7s var(--ease) 0.4s both; }
    .features { animation: fadeUp 0.7s var(--ease) 0.5s both; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    .fallback {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #1a1625;
    }
  </style>
</head>
<body>
  <div class="fallback" id="fallback"></div>
  <div class="ambient-glow"></div>

  <div class="page">
    <nav>
      <div class="nav-left">
        <a href="/" class="logo">
          <span class="logo-dot"></span>
          <span>Silly</span><span class="logo-brand">Client</span>
        </a>
        <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
      </div>
      <div class="nav-links">

      <div class="hero-actions">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>

        </a>
        <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases/download/v1.4.1/SillyClient-Setup-1.4.1.exe" target="_blank" rel="noopener" class="btn btn-glass">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>

    <section class="features">
      <div class="features-card">
        <div class="features-grid">
          <div class="feature">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>

          </div>
          <div class="feature">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            </div>
            <div class="feature-label" data-i18n="f2_title">多实例管理</div>
            <div class="feature-text" data-i18n="f2_text">独立端口与配置，卡片式轮播切换。</div>
          </div>
          <div class="feature">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
            </div>
            <div class="feature-label" data-i18n="f3_title">跨平台</div>
            <div class="feature-text" data-i18n="f3_text">Android + Windows，共享同一套前端。</div>
          </div>
          <div class="feature">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            </div>

    <footer>
      <span class="footer-text">MIT License</span>
      <div class="footer-links">
        <a href="https://github.com/CAPTCHAAAAA/SillyClient" target="_blank" rel="noopener">GitHub</a>
        <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases" target="_blank" rel="noopener">Releases</a>
      </div>
    </footer>

  <script>
    // === 中英切换 ===
    const i18n = {
      zh: {
        nav_source: '源码',
        hero_title: 'SillyTavern',
        hero_title_dim: '装进口袋',
        hero_sub: '跨平台启动器，内置完整运行时。安装即用，无需命令行。',
        f1_title: '内置运行时',
        f1_text: 'Node.js 随应用打包，无需 Termux 或命令行。',
        f2_title: '多实例管理',
        f2_text: '独立端口与配置，卡片式轮播切换。',
        f3_title: '跨平台',
        f3_text: 'Android + Windows，共享同一套前端。',
        f4_title: '原生体验',
        f4_text: '液态玻璃界面，状态栏适配，手势导航。',
      },
      en: {
        nav_source: 'Source',
        hero_title: 'SillyTavern',
        hero_title_dim: 'anywhere.',
        hero_sub: 'Cross-platform launcher with embedded runtime. Install, launch, no terminal needed.',
        f1_title: 'Embedded Runtime',
        f1_text: 'Node.js bundled. No Termux, no Docker, no CLI.',
        f2_title: 'Multi-Instance',
        f2_text: 'Isolated installs with independent ports and configs.',
        f3_title: 'Cross-Platform',
        f3_text: 'Android + Windows. Shared frontend, native shells.',
        f4_title: 'Native Feel',
        f4_text: 'Liquid glass UI, status bar adaptation, gesture nav.',
      }
    };

    let currentLang = localStorage.getItem('lang') || 'zh';

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      const dict = i18n[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key]) el.textContent = dict[key];
      });
      const btn = document.getElementById('langToggle');
      btn.textContent = lang === 'zh' ? 'EN' : '中文';
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    }

    function toggleLang() {
      setLang(currentLang === 'zh' ? 'en' : 'zh');
    }

    // 初始化语言
    setLang(currentLang);

    // === Three.js 3D 背景（品牌色粒子） ===
    (async function init3D() {
      try {
        const THREE = await import('https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js');
        const fallback = document.getElementById('fallback');
        if (fallback) fallback.style.display = 'none';

        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setClearColor(0x000000, 0);
        renderer.domElement.id = 'webgl-bg';
        renderer.domElement.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;';
        document.body.prepend(renderer.domElement);

        const world = new THREE.Scene();
        world.fog = new THREE.FogExp2(0x1a1625, 0.014);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 0, 35);

        // 品牌色粒子 (品红 + 暗酒红 + 暖白)
        const N = 500;
        const pos = new Float32Array(N * 3);
        const col = new Float32Array(N * 3);
        const sizes = new Float32Array(N);
        const alphas = new Float32Array(N);

        const brandColor = [232/255, 54/255, 93/255];    // #e8365d
        const wineColor = [106/255, 17/255, 46/255];       // #6a112e
        const warmWhite = [240/255, 236/255, 232/255];     // #f0ece8

        for (let i = 0; i < N; i++) {
          const r = 10 + Math.random() * 45;
          const t = Math.random() * Math.PI * 2;
          const p = Math.acos(2 * Math.random() - 1);
          pos[i*3] = r * Math.sin(p) * Math.cos(t);
          pos[i*3+1] = r * Math.sin(p) * Math.sin(t);
          pos[i*3+2] = r * Math.cos(p);

          const pick = Math.random();
          let c;
          if (pick < 0.4) c = brandColor;
          else if (pick < 0.7) c = wineColor;
          else c = warmWhite;

          const brightness = 0.3 + Math.random() * 0.7;
          col[i*3] = c[0] * brightness;
          col[i*3+1] = c[1] * brightness;
          col[i*3+2] = c[2] * brightness;

          alphas[i] = 0.2 + Math.random() * 0.5;
          sizes[i] = 1.0 + Math.random() * 2.0;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('aColor', new THREE.BufferAttribute(col, 3));
        geo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
        geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

        const mat = new THREE.ShaderMaterial({
          uniforms: { uTime: { value: 0 }, uPR: { value: Math.min(window.devicePixelRatio, 1.5) } },
          vertexShader: `
            attribute vec3 aColor;
            attribute float aAlpha;
            attribute float aSize;
            varying vec3 vColor;
            varying float vAlpha;
            uniform float uTime;
            uniform float uPR;
            void main() {
              vColor = aColor;
              vAlpha = aAlpha * (sin(uTime * 0.35 + position.x * 0.15 + position.y * 0.12) * 0.3 + 0.7);
              vec4 mv = modelViewMatrix * vec4(position, 1.0);
              gl_PointSize = aSize * uPR * (28.0 / -mv.z);
              gl_Position = projectionMatrix * mv;
            }
          `,
          fragmentShader: `
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
              float d = length(gl_PointCoord - 0.5);
              if (d > 0.5) discard;
              float a = smoothstep(0.5, 0.0, d) * vAlpha;
              gl_FragColor = vec4(vColor, a);
            }
          `,
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geo, mat);
        world.add(particles);

        // 线框（品牌色）
        const cfgs = [
          { pos: [-14, 7, -18], s: 3.2, rx: 0.002, ry: 0.003, rz: 0 },
          { pos: [15, -5, -22], s: 4.0, rx: -0.001, ry: 0.002, rz: 0.001 },
          { pos: [9, 10, -25], s: 2.0, rx: 0.003, ry: -0.002, rz: 0.001 },
          { pos: [-11, -8, -16], s: 1.8, rx: -0.002, ry: 0.004, rz: -0.001 },
        ];

        const meshGroup = [];
        cfgs.forEach((c, i) => {
          const g = new THREE.IcosahedronGeometry(c.s, 0);
          const edges = new THREE.EdgesGeometry(g);
          const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({
            color: new THREE.Color(0xe8365d),
            transparent: true,
            opacity: 0.12 + i * 0.03
          }));
          line.position.set(c.pos[0], c.pos[1], c.pos[2]);
          world.add(line);
          meshGroup.push({ obj: line, cfg: c, baseY: c.pos[1] });
        });

        // 中心光晕（品牌色）
        const glowGeo = new THREE.SphereGeometry(5, 20, 20);
        const glowMat = new THREE.ShaderMaterial({
          uniforms: { uTime: { value: 0 } },
          vertexShader: `
            varying vec3 vN;
            void main() {
              vN = normalize(normalMatrix * normal);
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform float uTime;
            varying vec3 vN;
            void main() {
              float i = pow(0.55 - dot(vN, vec3(0, 0, 1)), 2.5);
              vec3 c = vec3(0.91, 0.21, 0.36);
              gl_FragColor = vec4(c, i * 0.06);
            }
          `,
          transparent: true,
          blending: THREE.AdditiveBlending,
          side: THREE.BackSide,
          depthWrite: false
        });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.position.set(0, 0, -8);
        world.add(glow);

        // 鼠标视差
        const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
        window.addEventListener('mousemove', e => {
          mouse.tx = (e.clientX / window.innerWidth - 0.5) * 2;
          mouse.ty = (e.clientY / window.innerHeight - 0.5) * 2;
        });
        window.addEventListener('touchmove', e => {
          if (e.touches[0]) {
            mouse.tx = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
            mouse.ty = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
          }
        }, { passive: true });

        let scrollY = 0;
        window.addEventListener('scroll', () => { scrollY = window.scrollY; }, { passive: true });

        const clock = new THREE.Clock();
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function tick() {
          requestAnimationFrame(tick);
          const t = clock.getElapsedTime();
          mouse.x += (mouse.tx - mouse.x) * 0.04;
          mouse.y += (mouse.ty - mouse.y) * 0.04;
          camera.position.x = mouse.x * 2;
          camera.position.y = -mouse.y * 1.2 - scrollY * 0.008;
          camera.lookAt(0, 0, 0);

          if (!reduced) {
            particles.rotation.y = t * 0.012;
            particles.rotation.x = t * 0.006;
          }
          mat.uniforms.uTime.value = t;

          meshGroup.forEach((s, i) => {
            if (!reduced) {
              s.obj.rotation.x += s.cfg.rx;
              s.obj.rotation.y += s.cfg.ry;
              s.obj.rotation.z += s.cfg.rz;
            }
            s.obj.position.y = s.baseY + Math.sin(t * 0.2 + i * 1.5) * 1.0;
          });

          glowMat.uniforms.uTime.value = t;
          renderer.render(world, camera);
        }
        tick();

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
          mat.uniforms.uPR.value = Math.min(window.devicePixelRatio, 1.5);
        });
      } catch(e) {
        console.error('3D init failed:', e);
        const fallback = document.getElementById('fallback');
        if (fallback) fallback.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
