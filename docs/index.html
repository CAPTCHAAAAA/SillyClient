<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SillyClient</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Cdefs%3E%3ClinearGradient id='b' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%232D131E'/%3E%3Cstop offset='60%25' stop-color='%2314060A'/%3E%3Cstop offset='100%25' stop-color='%23080204'/%3E%3C/linearGradient%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23FF5E85'/%3E%3Cstop offset='40%25' stop-color='%23C7154B'/%3E%3Cstop offset='100%25' stop-color='%236A112E'/%3E%3C/linearGradient%3E%3ClinearGradient id='r' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='rgba(255%2C240%2C243%2C0.95)'/%3E%3Cstop offset='50%25' stop-color='rgba(255%2C225%2C232%2C0.45)'/%3E%3Cstop offset='100%25' stop-color='rgba(255%2C210%2C220%2C0.05)'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='256' height='256' rx='56' fill='url(%23b)'/%3E%3Cpath d='M208 48L80 48A32 32 0 0 0 48 80L48 176A32 32 0 0 0 80 208L208 208' fill='none' stroke='url(%23g)' stroke-width='32' stroke-linecap='round'/%3E%3Cpath d='M208 88L140 88A20 20 0 0 0 140 128L156 128A20 20 0 0 1 156 168L88 168' fill='none' stroke='url(%23r)' stroke-width='32' stroke-linecap='round'/%3E%3C/svg%3E" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #1a1625;
      color: #fff;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #bg { position: fixed; inset: 0; z-index: 0; }

    .scene {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    /* 3D 手机框架 */
    .phone-wrapper {
      position: relative;
      width: min(360px, 82vw);
      aspect-ratio: 9 / 19;
      transform-style: preserve-3d;
      transform: rotateY(-8deg) rotateX(2deg);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .phone-wrapper:hover {
      transform: rotateY(-2deg) rotateX(1deg) translateY(-4px);
    }

    .phone-frame {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 32px;
      border: 2.5px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      background: #1a1625;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04),
        0 40px 80px -20px rgba(0, 0, 0, 0.6),
        0 0 120px rgba(232, 54, 93, 0.04);
      transform: translateZ(0);
    }

    /* 刘海 */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 26px;
      background: #1a1625;
      border-radius: 0 0 18px 18px;
      z-index: 20;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-top: none;
    }

    /* 反光 */
    .phone-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 30px;
      background: linear-gradient(
        165deg,
        rgba(255, 255, 255, 0.06) 0%,
        transparent 40%,
        transparent 60%,
        rgba(255, 255, 255, 0.02) 100%
      );
      z-index: 21;
      pointer-events: none;
    }

    .phone-iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: auto;
    }

    /* 桌面反射 */
    .reflection {
      position: fixed;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: min(340px, 76vw);
      height: 30vh;
      background: radial-gradient(ellipse at top, rgba(232, 54, 93, 0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* 底部信息 */
    .info {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 20px 24px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(to top, rgba(26, 22, 37, 0.95) 0%, transparent 100%);
      pointer-events: none;
    }
    .info a {
      pointer-events: auto;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      transition: color 0.2s;
    }
    .info a:hover { color: rgba(255, 255, 255, 0.6); }
    .info span {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.15);
    }

    @media (max-width: 480px) {
      .phone-wrapper { transform: none; }
      .phone-wrapper:hover { transform: translateY(-4px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .phone-wrapper { transition: none; }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="scene">
    <div class="phone-wrapper" id="phoneWrapper">
      <div class="phone-frame">
        <iframe class="phone-iframe" id="appFrame" title="SillyClient"></iframe>
      </div>
    </div>
  </div>

  <div class="reflection"></div>

  <div class="info">
    <a href="https://github.com/CAPTCHAAAAA/SillyClient" target="_blank" rel="noopener">GitHub</a>
    <span>·</span>
    <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases" target="_blank" rel="noopener">Releases</a>
    <span>·</span>
    <span style="pointer-events:none">MIT License</span>
  </div>

  <script>
    // 嵌入前端 app（使用当前页面同源的 app/ 路径）
    document.getElementById('appFrame').src = './app/index.html';
  </script>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('bg');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x1a1625, 0.012);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 0, 40);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x1a1625, 1);

    // 粒子 — 与项目色系一致
    const N = 400;
    const pos = new Float32Array(N * 3);
    const col = new Float32Array(N * 3);
    const c1 = new THREE.Color(0x2a2240);  // 深紫灰
    const c2 = new THREE.Color(0xe8365d);  // 品牌玫瑰
    const c3 = new THREE.Color(0x3a3050);  // 中紫

    for (let i = 0; i < N; i++) {
      const i3 = i * 3;
      const r = 15 + Math.random() * 55;
      const th = Math.random() * Math.PI * 2;
      const ph = Math.acos(2 * Math.random() - 1);
      pos[i3] = r * Math.sin(ph) * Math.cos(th);
      pos[i3 + 1] = r * Math.sin(ph) * Math.sin(th);
      pos[i3 + 2] = r * Math.cos(ph);

      const p = Math.random();
      const c = p < 0.6 ? c1 : p < 0.85 ? c3 : c2;
      const b = 0.3 + Math.random() * 0.5;
      col[i3] = c.r * b; col[i3 + 1] = c.g * b; col[i3 + 2] = c.b * b;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

    const mat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 }, uPR: { value: Math.min(devicePixelRatio, 2) } },
      vertexShader: `
        attribute vec3 color;
        varying vec3 vC;
        uniform float uTime, uPR;
        void main() {
          vC = color;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          float tw = sin(uTime * 0.3 + position.x * 0.15 + position.y * 0.1) * 0.5 + 0.5;
          gl_PointSize = (0.8 + tw * 0.8) * uPR * (25.0 / -mv.z);
          gl_Position = projectionMatrix * mv;
        }`,
      fragmentShader: `
        varying vec3 vC;
        void main() {
          float d = length(gl_PointCoord - vec2(0.5));
          if (d > 0.5) discard;
          float a = smoothstep(0.5, 0.0, d);
          gl_FragColor = vec4(vC, a * 0.5);
        }`,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    const pts = new THREE.Points(geo, mat);
    scene.add(pts);

    // 鼠标视差
    const m = { x: 0, y: 0, tx: 0, ty: 0 };
    const wrapper = document.getElementById('phoneWrapper');

    addEventListener('mousemove', e => {
      m.tx = (e.clientX / innerWidth - 0.5) * 2;
      m.ty = (e.clientY / innerHeight - 0.5) * 2;
    });
    addEventListener('touchmove', e => {
      if (e.touches.length) {
        m.tx = (e.touches[0].clientX / innerWidth - 0.5) * 2;
        m.ty = (e.touches[0].clientY / innerHeight - 0.5) * 2;
      }
    }, { passive: true });

    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const clock = new THREE.Clock();

    function loop() {
      requestAnimationFrame(loop);
      const t = clock.getElapsedTime();

      m.x += (m.tx - m.x) * 0.05;
      m.y += (m.ty - m.y) * 0.05;

      camera.position.x = m.x * 2;
      camera.position.y = -m.y * 1;
      camera.lookAt(0, 0, 0);

      if (!reduced) {
        pts.rotation.y = t * 0.01;
        pts.rotation.x = Math.sin(t * 0.08) * 0.015;
        mat.uniforms.uTime.value = t;

        // 3D 框架跟随鼠标微动
        const ry = -8 + m.x * 6;
        const rx = 2 - m.y * 3;
        wrapper.style.transform = `rotateY(${ry}deg) rotateX(${rx}deg)`;
      }

      renderer.render(scene, camera);
    }
    loop();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      mat.uniforms.uPR.value = Math.min(devicePixelRatio, 2);
    });
  </script>
</body>
</html>
