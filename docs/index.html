<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SillyClient</title>
  <meta name="description" content="SillyTavern 跨平台启动器。内置 Node.js，安装即用。" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    /*
     * SillyClient Landing
     * 色彩策略: Drenched (品牌色承载主表面)
     * 场景句: 开发者在暗光下打开一个工具类 app 的官网
     * 设计锚点: Apple HIG + Vercel
     * AI Tell: 全部规避
     */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1625;
      --fg: #f0ece8;
      --fg-2: rgba(240, 236, 232, 0.58);
      --fg-3: rgba(240, 236, 232, 0.32);
      --brand: #e8365d;
      --brand-dim: rgba(232, 54, 93, 0.08);
      --wine: #6a112e;
      --wine-2: #3d0a1a;
      --surface: rgba(240, 236, 232, 0.04);
      --surface-2: rgba(240, 236, 232, 0.07);
      --rule: rgba(240, 236, 232, 0.08);
      --pill: 999px;
      --r: 14px;
      --font: "PingFang SC", "Helvetica Neue", "Hiragino Sans GB", system-ui, -apple-system, sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      line-height: 1.55;
      letter-spacing: -0.01em;
    }

    /* ====== 氛围层 ====== */
    .atmosphere {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .atm-blob {
      position: absolute;
      filter: blur(100px);
      will-change: transform;
    }
    .atm-blob:nth-child(1) {
      width: 55vmax; height: 55vmax;
      top: -25%; left: -18%;
      background: var(--wine);
      opacity: 0.45;
      border-radius: 40% 60% 55% 45% / 55% 40% 60% 45%;
      animation: drift-a 24s ease-in-out infinite;
    }
    .atm-blob:nth-child(2) {
      width: 40vmax; height: 40vmax;
      top: 10%; right: -14%;
      background: var(--brand);
      opacity: 0.12;
      border-radius: 55% 45% 60% 40% / 45% 55% 50% 50%;
      animation: drift-b 30s ease-in-out infinite;
    }
    .atm-blob:nth-child(3) {
      width: 35vmax; height: 35vmax;
      bottom: -18%; left: 30%;
      background: var(--wine-2);
      opacity: 0.5;
      border-radius: 48% 52% 46% 54% / 52% 48% 56% 44%;
      animation: drift-c 26s ease-in-out infinite;
    }

    @keyframes drift-a {
      0%, 100% { transform: translate(0, 0) rotate(0deg); border-radius: 40% 60% 55% 45% / 55% 40% 60% 45%; }
      33% { transform: translate(6vw, 3vh) rotate(15deg); border-radius: 52% 48% 42% 58% / 48% 52% 55% 45%; }
      66% { transform: translate(-3vw, -5vh) rotate(-10deg); border-radius: 45% 55% 58% 42% / 55% 45% 42% 58%; }
    }
    @keyframes drift-b {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-4vw, 5vh) rotate(-12deg); }
    }
    @keyframes drift-c {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40% { transform: translate(4vw, -4vh) scale(1.04); }
      70% { transform: translate(-2vw, 2vh) scale(0.97); }
    }

    @media (prefers-reduced-motion: reduce) {
      .atm-blob { animation: none !important; }
    }

    /* ====== 页面结构 ====== */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ====== 导航 ====== */
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(26, 22, 37, 0.72);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--rule);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--fg);
    }
    .logo img {
      width: 28px; height: 28px;
      border-radius: 7px;
    }
    .logo-text {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
    }
    .logo-text span { color: var(--brand); }

    .nav-link {
      font-size: 13px;
      color: var(--fg-3);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: var(--pill);
      transition: color 0.2s var(--ease), background 0.2s var(--ease);
    }
    .nav-link:hover { color: var(--fg-2); background: var(--surface); }

    .lang-btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-3);
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: var(--pill);
      padding: 4px 11px;
      cursor: pointer;
      transition: color 0.2s var(--ease), border-color 0.2s var(--ease);
    }
    .lang-btn:hover { color: var(--fg-2); border-color: rgba(240, 236, 232, 0.15); }

    /* ====== Hero ====== */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 48px;
      min-height: 68dvh;
    }

    .hero-icon {
      width: 72px; height: 72px;
      border-radius: 18px;
      margin-bottom: 32px;
      box-shadow: 0 4px 32px rgba(232, 54, 93, 0.25);
    }

    .hero h1 {
      font-size: clamp(38px, 7vw, 62px);
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1.08;
      margin-bottom: 16px;
      text-wrap: balance;
    }
    .hero h1 .light {
      font-weight: 300;
      color: var(--fg-2);
    }

    .hero p {
      font-size: clamp(14px, 1.8vw, 16px);
      color: var(--fg-3);
      max-width: 360px;
      margin-bottom: 40px;
      line-height: 1.7;
      text-wrap: pretty;
    }

    .ctas {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ====== 按钮 ====== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--pill);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      letter-spacing: -0.005em;
      transition: transform 0.15s var(--ease), box-shadow 0.3s ease, background 0.2s ease;
    }
    .btn:active { transform: scale(0.97) translateY(1px); }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .btn-fill {
      color: #fff;
      background: var(--brand);
      box-shadow: 0 2px 20px rgba(232, 54, 93, 0.3);
    }
    .btn-fill:hover {
      box-shadow: 0 4px 28px rgba(232, 54, 93, 0.4);
      transform: translateY(-1px);
    }

    .btn-ghost {
      color: var(--fg-2);
      background: var(--surface);
      border: 1px solid var(--rule);
    }
    .btn-ghost:hover {
      color: var(--fg);
      background: var(--surface-2);
      transform: translateY(-1px);
    }

    /* ====== 内容区 ====== */
    .content {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 24px 64px;
      width: 100%;
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .info-item {
      padding: 20px 0;
      border-bottom: 1px solid var(--rule);
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: padding-left 0.3s var(--ease);
    }
    .info-item:last-child { border-bottom: none; }
    .info-item:hover { padding-left: 4px; }

    .info-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--brand);
      margin-top: 7px;
      flex-shrink: 0;
      opacity: 0.6;
    }
    .info-item:hover .info-dot { opacity: 1; }

    .info-text h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
    }
    .info-text p {
      font-size: 13px;
      color: var(--fg-3);
      line-height: 1.5;
    }

    /* ====== Footer ====== */
    footer {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--rule);
    }
    .foot-copy { font-size: 11px; color: var(--fg-3); }
    .foot-links { display: flex; gap: 16px; }
    .foot-links a {
      font-size: 11px;
      color: var(--fg-3);
      text-decoration: none;
      transition: color 0.2s var(--ease);
    }
    .foot-links a:hover { color: var(--fg-2); }

    /* ====== 入场 ====== */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-icon  { animation: fade-up 0.7s var(--ease) 0.05s both; }
    .hero h1    { animation: fade-up 0.7s var(--ease) 0.15s both; }
    .hero p     { animation: fade-up 0.7s var(--ease) 0.25s both; }
    .ctas       { animation: fade-up 0.7s var(--ease) 0.35s both; }
    .content    { animation: fade-up 0.7s var(--ease) 0.45s both; }
    footer      { animation: fade-up 0.7s var(--ease) 0.52s both; }

    /* ====== Responsive ====== */
    @media (max-width: 640px) {
      nav { padding: 14px 20px; }
      .hero { padding: 56px 20px 36px; min-height: 60dvh; }
      .hero-icon { width: 56px; height: 56px; border-radius: 14px; margin-bottom: 24px; }
      .ctas { flex-direction: column; width: 100%; max-width: 280px; }
      .btn { justify-content: center; width: 100%; }
      .content { padding: 0 20px 48px; }
      footer { padding: 16px 20px; flex-direction: column; gap: 10px; text-align: center; }
    }

    /* ====== A11y ====== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
    @media (prefers-reduced-transparency: reduce) {
      .atm-blob { display: none; }
      nav { backdrop-filter: none; -webkit-backdrop-filter: none; background: var(--bg); }
    }
  </style>
</head>
<body>
  <div class="atmosphere" aria-hidden="true">
    <div class="atm-blob"></div>
    <div class="atm-blob"></div>
    <div class="atm-blob"></div>
  </div>

  <div class="page">
    <nav>
      <div class="nav-left">
        <a href="/" class="logo">
          <img src="favicon.png" alt="" width="28" height="28" />
          <div class="logo-text">Silly<span>Client</span></div>
        </a>
      </div>
      <div class="nav-right">
        <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
        <a href="https://github.com/CAPTCHAAAAA/SillyClient" target="_blank" rel="noopener" class="nav-link" data-i18n="nav_src">源码</a>
        <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases" target="_blank" rel="noopener" class="nav-link">Releases</a>
      </div>
    </nav>

    <section class="hero">
      <img class="hero-icon" src="favicon.png" alt="SillyClient" width="72" height="72" />
      <h1>
        <span data-i18n="t1">SillyTavern</span>,
        <span class="light" data-i18n="t2">装进口袋</span>
      </h1>
      <p data-i18n="sub">内置 Node.js 运行时，安装即用。无需 Termux，无需命令行。</p>
      <div class="ctas">
        <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases/latest" target="_blank" rel="noopener" class="btn btn-fill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          Android
        </a>
        <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases/download/v1.4.1/SillyClient-Setup-1.4.1.exe" target="_blank" rel="noopener" class="btn btn-ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Windows
        </a>
      </div>
    </section>

    <section class="content">
      <div class="info-list">
        <div class="info-item">
          <div class="info-dot"></div>
          <div class="info-text">
            <h3 data-i18n="n1">内置运行时</h3>
            <p data-i18n="d1">Node.js 随应用打包，零外部依赖。</p>
          </div>
        </div>
        <div class="info-item">
          <div class="info-dot"></div>
          <div class="info-text">
            <h3 data-i18n="n2">多实例管理</h3>
            <p data-i18n="d2">独立端口与配置，卡片切换。</p>
          </div>
        </div>
        <div class="info-item">
          <div class="info-dot"></div>
          <div class="info-text">
            <h3 data-i18n="n3">跨平台</h3>
            <p data-i18n="d3">Android + Windows，同一套 React 前端。</p>
          </div>
        </div>
        <div class="info-item">
          <div class="info-dot"></div>
          <div class="info-text">
            <h3 data-i18n="n4">原生体验</h3>
            <p data-i18n="d4">液态玻璃界面，状态栏适配，手势导航。</p>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <span class="foot-copy">MIT License</span>
      <div class="foot-links">
        <a href="https://github.com/CAPTCHAAAAA/SillyClient" target="_blank" rel="noopener">GitHub</a>
        <a href="https://github.com/CAPTCHAAAAA/SillyClient/releases" target="_blank" rel="noopener">Releases</a>
      </div>
    </footer>
  </div>

  <script>
    const i18n = {
      zh: {
        nav_src: '源码',
        t1: 'SillyTavern', t2: '装进口袋',
        sub: '内置 Node.js 运行时，安装即用。无需 Termux，无需命令行。',
        n1: '内置运行时', d1: 'Node.js 随应用打包，零外部依赖。',
        n2: '多实例管理', d2: '独立端口与配置，卡片切换。',
        n3: '跨平台', d3: 'Android + Windows，同一套 React 前端。',
        n4: '原生体验', d4: '液态玻璃界面，状态栏适配，手势导航。',
      },
      en: {
        nav_src: 'Source',
        t1: 'SillyTavern', t2: 'in your pocket.',
        sub: 'Embedded Node.js runtime. Install, launch, done.',
        n1: 'Embedded Runtime', d1: 'Node.js bundled. Zero external dependencies.',
        n2: 'Multi-Instance', d2: 'Isolated ports and configs per instance.',
        n3: 'Cross-Platform', d3: 'Android + Windows. Shared React frontend.',
        n4: 'Native Feel', d4: 'Liquid glass UI, status bar, gesture nav.',
      }
    };
    let lang = localStorage.getItem('lang') || 'zh';
    function setLang(l) {
      lang = l;
      localStorage.setItem('lang', l);
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (i18n[l][k]) el.textContent = i18n[l][k];
      });
      document.getElementById('langBtn').textContent = l === 'zh' ? 'EN' : '\u4e2d\u6587';
      document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    }
    function toggleLang() { setLang(lang === 'zh' ? 'en' : 'zh'); }
    setLang(lang);
  </script>
</body>
</html>
