<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>SillyClient 酒馆启动器</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
    html.light, html.light body { background-color: #ffffff !important; color: #000000; }
    html.dark, html.dark body { background-color: #1a1a1a !important; color: #ffffff; }
  </style>
  <script>
    (function() {
      function applyThemeToDOM(theme) {
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
        document.documentElement.setAttribute('data-theme', theme);
      }
      var stored = localStorage.getItem('theme');
      if (stored === 'dark' || stored === 'light') {
        applyThemeToDOM(stored);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        applyThemeToDOM('dark');
      } else {
        applyThemeToDOM('light');
      }
    })();
  </script>
  <script type="module" crossorigin src="./app/assets/index-DQUc1mSr.js"></script>
  <link rel="stylesheet" crossorigin href="./app/assets/index-Zk5KTHQt.css">
</head>
<body>
  <div id="root"></div>
</body>
</html>
